<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Avalore Data Converter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0e13;--s1:#19181f;--s2:#201f28;--s3:#2a2934;
  --border:#2e2d3a;--border-strong:#3e3d4e;
  --text:#e8e6f0;--muted:#a09eb8;--dim:#5e5c78;
  --accent:#8b6fd4;--accent-dim:#2d2248;--accent-border:#5c4499;--accent-text:#c4aff8;
  --gold:#c9a84c;--gold-dim:#2a2210;--gold-border:#7a601e;--gold-text:#e8cc88;
  --success:#4caf7d;--success-dim:#0d2a1a;--success-border:#1e6640;
  --danger:#c95555;--danger-dim:#2a0e0e;--danger-border:#7a2222;
  --warning:#c9943a;--warning-dim:#2a1e08;--warning-border:#7a5410;
  --radius:6px;--radius-lg:10px;
}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
.page{max-width:1200px;margin:0 auto;padding:2rem 1.25rem}
.top-bar{display:flex;align-items:center;gap:12px;margin-bottom:2rem;padding-bottom:1rem;border-bottom:1px solid var(--border)}
.game-title{font-family:'Cinzel',serif;font-size:22px;font-weight:500;letter-spacing:.08em;background:linear-gradient(135deg,var(--gold-text),var(--accent-text));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.page-sub{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.card{background:var(--s2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}
.card-title{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);margin-bottom:.75rem;font-family:'Cinzel',serif}
.layout{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
@media(max-width:768px){.layout{grid-template-columns:1fr}}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:5px}
select,textarea{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:8px 10px;outline:none;transition:border-color .15s}
select:focus,textarea:focus{border-color:var(--accent-border)}
textarea{resize:vertical;min-height:360px;line-height:1.6}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--radius);border:1px solid var(--border-strong);background:transparent;color:var(--text);font-size:13px;font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s}
.btn:hover{background:var(--s3);border-color:var(--accent-border)}
.btn-accent{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-accent:hover{background:#7a5fc4;border-color:#7a5fc4}
.btn-success{background:var(--success-dim);border-color:var(--success-border);color:var(--success)}
.btn-success:hover{background:#0f3a22}
.btn-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:1rem}
.preview-table{width:100%;border-collapse:collapse;font-size:12px}
.preview-table th{text-align:left;font-size:10px;color:var(--dim);font-weight:600;padding:5px 8px;border-bottom:1px solid var(--border);font-family:'Cinzel',serif;letter-spacing:.06em;text-transform:uppercase}
.preview-table td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:top;color:var(--muted);max-width:300px;}
.preview-table td.nowrap{white-space:nowrap}
.preview-table td.wrap{white-space:normal;word-break:break-word;line-height:1.5}
.preview-table td:first-child{color:var(--text);font-weight:500;white-space:nowrap}
.preview-table tr:last-child td{border-bottom:none}
.preview-table tr:hover td{background:var(--s3)}
.preview-wrap{overflow-x:auto;max-height:500px;overflow-y:auto;border:1px solid var(--border);border-radius:var(--radius)}
.output-area textarea{min-height:180px;font-family:monospace;font-size:11px;color:var(--accent-text);min-height:220px}
.tip{font-size:11px;color:var(--dim);margin-top:6px;line-height:1.6}
.format-guide{background:var(--s1);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem;margin-bottom:.75rem;font-size:12px;color:var(--muted);line-height:1.7}
.format-guide b{color:var(--text);font-weight:500}
.status{font-size:12px;color:var(--muted)}
.status.ok{color:var(--success)}.status.err{color:var(--danger)}
.sel-row{display:flex;gap:8px;margin-bottom:.75rem}
.sel-row select{flex:1}
.branch-sel{display:none}
.sub-label{font-size:11px;color:var(--dim);margin-bottom:4px}
.sep{height:1px;background:var(--border);margin:.75rem 0}
</style>
</head>
<body>
<div class="page">
  <div class="top-bar">
    <div><div class="game-title">Avalore</div></div>
    <div class="page-sub">Data File Converter</div>
  </div>

  <div class="layout">
    <!-- Input -->
    <div class="card">
      <div class="card-title">Input</div>

      <div class="sel-row">
        <div style="flex:1">
          <div class="sub-label">Data type</div>
          <select id="format-sel" onchange="onFormatChange()">
            <option value="">— select type —</option>
            <option value="spells">Spells</option>
            <option value="feats">Feats</option>
            <option value="weapons">Weapons</option>
            <option value="hindrances">Hindrances</option>
            <option value="costs">Costs (XP)</option>
          </select>
        </div>
        <div style="flex:1" id="branch-wrap" class="branch-sel">
          <div class="sub-label">Branch <span style="color:var(--danger)">*required</span></div>
          <select id="branch-sel">
            <option value="">— select branch —</option>
            <optgroup label="— Cantrips (outputs cantrips.js) —">
              <option value="cantrips-all">All cantrips</option>
            </optgroup>
            <optgroup label="— Discipline spells (outputs branch file) —">
              <option value="Ichor">Ichor</option>
              <option value="Cursesmithy">Cursesmithy</option>
              <option value="Ether">Ether</option>
              <option value="Artifice">Artifice</option>
              <option value="Force">Force</option>
              <option value="Tellurgy">Tellurgy</option>
            </optgroup>
          </select>
        </div>
      </div>

      <div id="format-guide" class="format-guide" style="display:none"></div>

      <label for="raw-input">Paste raw forum text</label>
      <textarea id="raw-input" placeholder="Paste the raw text from the Avalore forum here…" spellcheck="false"></textarea>

      <div class="btn-row">
        <button class="btn btn-accent" onclick="convert()">Convert →</button>
        <button class="btn" onclick="clearAll()">Clear</button>
        <span class="status" id="parse-status"></span>
      </div>
    </div>

    <!-- Preview + Output -->
    <div style="display:flex;flex-direction:column;gap:1rem">
      <div class="card">
        <div class="card-title">Preview <span id="preview-count" style="color:var(--dim);font-weight:400;font-family:'Inter',sans-serif;font-size:11px;text-transform:none;letter-spacing:0"></span></div>
        <div id="preview-area"><p style="color:var(--dim);font-size:12px">Parsed results will appear here.</p></div>
      </div>

      <div class="card output-area">
        <div class="card-title">Output</div>
        <textarea id="js-output" readonly placeholder="Generated JS will appear here…" spellcheck="false"></textarea>
        <div class="btn-row">
          <button class="btn btn-success" onclick="downloadJS()" id="dl-btn" disabled>↓ Download</button>
          <button class="btn" onclick="copyJS()" id="copy-btn" disabled>Copy</button>
        </div>
        <p class="tip" id="dl-tip">Download the file and place it in your repo's <code>data/</code> folder.</p>
      </div>
    </div>
  </div>
</div>

<script>
// ── Constants ───────────────────────────────────────────────────────────────
const SPELL_BRANCH_FILES = {
  // Cantrip modes — all output to cantrips.js / CANTRIPS_DEFAULT
  'cantrips-all':      { file:'cantrips.js', var:'CANTRIPS_DEFAULT' },
  'cantrips-general':  { file:'cantrips.js', var:'CANTRIPS_DEFAULT' },
  'cantrips-patron':   { file:'cantrips.js', var:'CANTRIPS_DEFAULT' },
  'cantrips-inherent': { file:'cantrips.js', var:'CANTRIPS_DEFAULT' },
  // Discipline branch files
  'Ichor':       { file:'ichor.js',       var:'SPELLS_ICHOR'       },
  'Cursesmithy': { file:'cursesmithy.js', var:'SPELLS_CURSESMITHY' },
  'Ether':       { file:'ether.js',       var:'SPELLS_ETHER'       },
  'Artifice':    { file:'artifice.js',    var:'SPELLS_ARTIFICE'    },
  'Force':       { file:'force.js',       var:'SPELLS_FORCE'       },
  'Tellurgy':    { file:'tellurgy.js',    var:'SPELLS_TELLURGY'    },
};

const CANTRIP_MODES = new Set(['cantrips-all','cantrips-general','cantrips-patron','cantrips-inherent']);

const INHERENT_BRANCH_MAP = {
  'ichor':'Ichor Cantrip','cursesmithy':'Cursesmithy Cantrip',
  'ether':'Ether Cantrip','artifice':'Artifice Cantrip',
  'force':'Force Cantrip','tellurgy':'Tellurgy Cantrip',
};

const FORMAT_GUIDES = {
  spells: `<b>Spells:</b> Select the branch, then paste the text.<br>
<b>All cantrips:</b> Paste all cantrip pages together — general, patron, and discipline pages. The parser detects each type automatically from "Inherent Cantrip" markers and patron labels in the Effect text.<br>
<b>Discipline spells:</b> Paste a discipline page — the Inherent Cantrip block at the top is skipped automatically.<br>
Each spell needs: name, Effect:, Method:, and a footer line like <code>Ichor 4 anima 2 actions /cast exorcise</code>.`,
  feats:  `<b>Feats:</b> Paste directly from the forum feat page. Category headers like <code>Combat</code>, <code>Mutation</code>, <code>Lineage Weapon</code>, <code>Backgrounds</code>, <code>Arcane Hindrances</code>, and <code>Mutant Hindrances</code> are detected automatically. Arcane and Mutant Hindrances are exported separately into <code>hindrances.js</code> format at the bottom of the output.`,
  weapons:`<b>Weapons &amp; Armour:</b> Paste directly from the forum weapons page. Section headers like <code>Melee</code>, <code>Skirmishing</code>, <code>Ranged</code>, <code>Armour</code>, and <code>Shields</code> are detected automatically. Weapons are anchored by their stats line (<code>One-handed 4 damage 1 action /roll arming</code>) and armour by their <code>/roll armour</code> line.`,
  hindrances:`<b>Hindrances:</b> Paste hindrance entries. Include a header like <code>Arcane Hindrance</code> or <code>Mutant Hindrance</code> before each group.`,
  costs:  `<b>Costs:</b> One entry per line in format: <code>type_key, Label Name, XP cost</code><br>Example: <code>skill_up, Skill upgrade, 6</code>`,
};

// ── UI handlers ─────────────────────────────────────────────────────────────
function onFormatChange() {
  const fmt = document.getElementById('format-sel').value;
  const guide = document.getElementById('format-guide');
  const branchWrap = document.getElementById('branch-wrap');
  guide.innerHTML = FORMAT_GUIDES[fmt] || '';
  guide.style.display = fmt ? '' : 'none';
  branchWrap.style.display = fmt === 'spells' ? 'block' : 'none';
  clearOutput();
}

function clearOutput() {
  document.getElementById('preview-area').innerHTML = '<p style="color:var(--dim);font-size:12px">Parsed results will appear here.</p>';
  document.getElementById('preview-count').textContent = '';
  document.getElementById('js-output').value = '';
  document.getElementById('dl-btn').disabled = true;
  document.getElementById('copy-btn').disabled = true;
  document.getElementById('parse-status').textContent = '';
  document.getElementById('parse-status').className = 'status';
}

function clearAll() {
  document.getElementById('raw-input').value = '';
  document.getElementById('format-sel').value = '';
  document.getElementById('branch-sel').value = '';
  document.getElementById('format-guide').style.display = 'none';
  document.getElementById('branch-wrap').style.display = 'none';
  clearOutput();
}

// ── SPELL PARSER ─────────────────────────────────────────────────────────────
// Splits raw forum text into individual spell blocks and parses each one.
// Each spell block is separated by blank lines or --- dividers.
// The parser looks for: name, Targeted flag, Effect:, Method:, footer line, Requirement.

// ── Cantrip parser helpers ──────────────────────────────────────────────────
const PATRON_NAMES = ["Myo","The Fey Coterie","The Dreaming One","Facet","Ciren'na"];

function detectPatron(blockLines) {
  const txt = blockLines.join(' ').toLowerCase();
  if (txt.includes('myo'))             return 'Myo';
  if (txt.includes('fey coterie'))     return 'The Fey Coterie';
  if (txt.includes('dreaming one'))    return 'The Dreaming One';
  if (txt.includes('facet'))           return 'Facet';
  if (txt.includes("ciren'na") || txt.includes('cirenna')) return "Ciren'na";
  return '';
}

function parseCantrips(text, mode) {
  // mode: 'cantrips-all' | 'cantrips-general' | 'cantrips-patron' | 'cantrips-inherent'
  const results = [];

  if (mode === 'cantrips-all') {
    // Split on section headers and parse each section
    const patronIdx   = text.search(/patron cantrips/i);
    const inherentIdx = text.search(/inherent cantrip/i);

    // General section: everything before the first of patron/inherent headers
    const generalEnd = Math.min(
      patronIdx   >= 0 ? patronIdx   : Infinity,
      inherentIdx >= 0 ? inherentIdx : Infinity
    );
    if (generalEnd > 0) {
      results.push(...parseCantrips(text.slice(0, generalEnd), 'cantrips-general'));
    }
    // Patron section
    if (patronIdx >= 0) {
      const patronEnd = inherentIdx > patronIdx ? inherentIdx : text.length;
      results.push(...parseCantrips(text.slice(patronIdx, patronEnd), 'cantrips-patron'));
    }
    // Inherent section — included in the general pass since
    // parseCantripsBlock detects "Inherent Cantrip" marker lines automatically
    return results;
  }

    if (mode === 'cantrips-inherent') {
    const linesArr = text.split('\n');
    let startLine = 0, endLine = linesArr.length;
    for (let i = 0; i < linesArr.length; i++) {
      if (/inherent cantrip/i.test(linesArr[i])) { startLine = i; break; }
    }
    for (let i = startLine + 1; i < linesArr.length; i++) {
      const t = linesArr[i].trim();
      if (/^\d+\s+anima$/i.test(t) || /^capstone$/i.test(t)) { endLine = i; break; }
    }
    const chunk = linesArr.slice(startLine, endLine).join('\n');
    const discMatch = text.match(/ichor|cursesmithy|ether|artifice|force|tellurgy/i);
    const disc = discMatch ? discMatch[0].toLowerCase() : 'ichor';
    const disciplineBranch = INHERENT_BRANCH_MAP[disc] || 'Ichor Cantrip';
    return parseCantripsBlock(chunk, 'inherent', disciplineBranch, '');
  }
  const cantripType  = mode === 'cantrips-patron' ? 'patron' : 'general';
  const cantripBranch = mode === 'cantrips-patron' ? 'Patron Cantrip' : 'General Cantrip';
  return parseCantripsBlock(text, cantripType, cantripBranch, '');
}

function parseCantripsBlock(text, type, branch, forcedPatron) {
  const results = [];
  const lines = text.split(/\r?\n/).map(l => l.trim());
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    if (!line || /^-{2,}$/.test(line) || /^\(\d+\s+spell/i.test(line) ||
        /^(general|patron|inherent)\s+cantrip/i.test(line) ||
        /^\d+\s+anima$/i.test(line)) { i++; continue; }

    // Look for footer
    let footerIdx = -1;
    for (let j = i; j < Math.min(i + 20, lines.length); j++) {
      if (/\/(cast|roll)\s+\S+/i.test(lines[j])) { footerIdx = j; break; }
    }
    if (footerIdx === -1) { i++; continue; }

    const block = lines.slice(i, footerIdx + 2);
    const footer = lines[footerIdx];
    const afterFooter = lines[footerIdx + 1] || '';
    // If the line before this block was "Inherent Cantrip", mark it as inherent
    // and detect which discipline branch from earlier context
    const prevLine = i > 0 ? lines[i - 1] : '';
    const isInherentMarker = /^inherent cantrip$/i.test(prevLine);

    const name = block[0];
    if (!name || name.length > 100 || /^(effect|method|targeted|requires)/i.test(name)) {
      i = footerIdx + 1; continue;
    }

    const targeted = block.some(l => /^targeted$/i.test(l));
    const effectStart = block.findIndex(l => /^effect:/i.test(l));
    const methodStart = block.findIndex(l => /^method:/i.test(l));
    let desc = '';
    if (effectStart >= 0) {
      const end = methodStart > effectStart ? methodStart : footerIdx - i;
      desc = block.slice(effectStart, end).map(l => l.replace(/^effect:\s*/i,'').trim()).filter(Boolean).join(' ');
    } else {
      const end = methodStart > 0 ? methodStart : footerIdx - i;
      desc = block.slice(1, end).filter(l => !/^(method:|targeted$)/i.test(l)).join(' ').trim();
    }
    let method = '';
    if (methodStart >= 0) {
      method = block.slice(methodStart, footerIdx - i).map(l => l.replace(/^method:\s*/i,'').trim()).filter(Boolean).join(' ');
    }
    const cmdMatch = footer.match(/\/(cast|roll)\s+(\S+)/i);
    const actionsMatch = footer.match(/(\d+)\s*action/i);
    const cmd = cmdMatch ? `/${cmdMatch[1].toLowerCase()} ${cmdMatch[2].toLowerCase()}` : '';
    const actions = actionsMatch ? actionsMatch[1] : '1';

    // Detect patron label embedded in effect text e.g. "Dreaming One Cantrip ..."
    // This overrides the passed-in type/branch/patron when detected
    const PATRON_LABELS = [
      { pattern: /^The Dreaming One Cantrip\s*/i, patron: 'The Dreaming One' },
      { pattern: /^The Fey Coterie Cantrip\s*/i,  patron: 'The Fey Coterie'  },
      { pattern: /^Ciren'na Cantrip\s*/i,          patron: "Ciren'na"         },
      { pattern: /^Facet Cantrip\s*/i,             patron: 'Facet'            },
      { pattern: /^Myo Cantrip\s*/i,               patron: 'Myo'              },
    ];
    let resolvedType   = isInherentMarker ? 'inherent' : type;
    let resolvedBranch = isInherentMarker
      ? (branch.endsWith('Cantrip') ? branch : branch + ' Cantrip')
      : branch;
    let resolvedPatron = forcedPatron || (type === 'patron' ? detectPatron(block) : '');

    for (const { pattern, patron: pName } of PATRON_LABELS) {
      if (pattern.test(desc)) {
        desc = desc.replace(pattern, '').trim();
        resolvedType   = 'patron';
        resolvedBranch = 'Patron Cantrip';
        resolvedPatron = pName;
        break;
      }
    }

    let req = 'None';
    if (/^no requirement/i.test(afterFooter)) req = 'None';
    else if (/^requires?\s*/i.test(afterFooter)) req = afterFooter.replace(/^requires?\s*/i,'').replace(/\.$/,'').trim();

    if (name && (desc || method)) {
      results.push({ branch: resolvedBranch, name, type: resolvedType, anima: 0, actions, cmd, req, patron: resolvedPatron, capstone: false, targeted, desc, method });
    }
    i = footerIdx + 2;
  }
  return results;
}

function parseSpells(text, branch) {
  // Cantrip modes go to the dedicated cantrip parser
  if (CANTRIP_MODES.has(branch)) return parseCantrips(text, branch);

  // Discipline branch: skip the Inherent Cantrip block at the top
  const spellLineArr = text.split('\n');
  let skipTo = 0, foundInherent = false;
  for (let si = 0; si < spellLineArr.length; si++) {
    if (/inherent cantrip/i.test(spellLineArr[si])) { foundInherent = true; }
    if (foundInherent && /^\d+\s+anima$/i.test(spellLineArr[si].trim())) { skipTo = si; break; }
  }
  if (foundInherent && skipTo > 0) text = spellLineArr.slice(skipTo).join('\n');
  const spells = [];

  // Normalise line endings and split into non-empty lines
  const lines = text.split(/\r?\n/).map(l => l.trim());

  // Walk through lines collecting spell blocks
  // A spell block ends when we hit the stats footer line (/cast or /roll)
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];

    // Skip blank lines, section headers, dividers, count lines
    if (!line || /^-{2,}$/.test(line) || /^\(\d+\s+spell/i.test(line) ||
        /^\d+\s+anima$/i.test(line) || /^capstone$/i.test(line) ||
        /^(general|patron|inherent)\s+cantrip/i.test(line) ||
        /^(ichor|cursesmithy|ether|artifice|force|tellurgy)\s*$/i.test(line)) {
      i++; continue;
    }

    // Look ahead for the footer line (/cast xxx or /roll xxx)
    let footerIdx = -1;
    for (let j = i; j < Math.min(i + 25, lines.length); j++) {
      if (/\/(cast|roll)\s+\S+/i.test(lines[j])) { footerIdx = j; break; }
    }
    if (footerIdx === -1) { i++; continue; }

    // Collect all lines from name through footer
    const block = lines.slice(i, footerIdx + 2); // +2 to include requirement line after footer
    const footer = lines[footerIdx];
    const afterFooter = lines[footerIdx + 1] || '';

    // ── Parse name (first non-blank line in block) ──
    const name = block[0];
    if (!name || name.length > 100 || /^(effect|method|targeted|requires)/i.test(name)) {
      i = footerIdx + 1; continue;
    }

    // ── Targeted flag ──
    const targeted = block.some(l => /^targeted$/i.test(l));

    // ── Effect section ──
    let desc = '';
    const effectStart = block.findIndex(l => /^effect:/i.test(l));
    const methodStart = block.findIndex(l => /^method:/i.test(l));
    if (effectStart >= 0) {
      const end = methodStart > effectStart ? methodStart : footerIdx - i;
      desc = block.slice(effectStart, end)
        .map(l => l.replace(/^effect:\s*/i, '').trim())
        .filter(Boolean).join(' ');
      // Remove patron cantrip label e.g. "Myo Cantrip" at start of effect
      desc = desc.replace(/^(Myo|The Fey Coterie|The Dreaming One|Facet|Ciren'na)\s+Cantrip\s*/i, '').trim();
    } else {
      // No Effect: label — use all lines between name and Method/footer
      const end = methodStart > 0 ? methodStart : footerIdx - i;
      desc = block.slice(1, end).filter(l =>
        !/^(method:|targeted$|—|-{2,})/i.test(l)
      ).join(' ').trim();
    }

    // ── Method section ──
    let method = '';
    if (methodStart >= 0) {
      method = block.slice(methodStart, footerIdx - i)
        .map(l => l.replace(/^method:\s*/i, '').trim())
        .filter(Boolean).join(' ');
    }

    // ── Parse footer for anima/actions/cmd ──
    // e.g. " Ichor 4 anima 2 actions /cast bloodhound"
    // e.g. " Cantrip (0 anima) 1 action /cast trick"
    const animaMatch   = footer.match(/(\d+)\s*anima|cantrip\s*\(0\s*anima\)/i);
    const actionsMatch = footer.match(/(\d+)\s*action/i);
    const cmdMatch     = footer.match(/\/(cast|roll)\s+(\S+)/i);

    const anima   = animaMatch ? (animaMatch[0].toLowerCase().includes('cantrip') ? 0 : parseInt(animaMatch[1])) : 0;
    const actions = actionsMatch ? actionsMatch[1] : '1';
    const cmd     = cmdMatch ? `/${cmdMatch[1].toLowerCase()} ${cmdMatch[2].toLowerCase()}` : '';

    // ── Patron (for Patron Cantrip branch) ──
    let patron = '';
    if (branch === 'Patron Cantrip') {
      const allText = block.join(' ').toLowerCase();
      if (allText.includes('myo'))                          patron = 'Myo';
      else if (allText.includes('fey coterie'))             patron = 'The Fey Coterie';
      else if (allText.includes('dreaming one'))            patron = 'The Dreaming One';
      else if (allText.includes('facet'))                   patron = 'Facet';
      else if (allText.includes("ciren'na") || allText.includes('cirenna')) patron = "Ciren'na";
    }

    // ── Capstone ──
    const capstone = block.some(l => /capstone/i.test(l));

    // ── Requirement ──
    let req = 'None';
    if (/^no requirement/i.test(afterFooter)) req = 'None';
    else if (/^requires?\s*/i.test(afterFooter)) {
      req = afterFooter.replace(/^requires?\s*/i, '').replace(/\.$/, '').trim();
    }

    if (name && (desc || method)) {
      spells.push({ branch, name, anima, actions, cmd, req, patron, capstone, targeted, desc, method });
    }

    i = footerIdx + 2;
  }

  return spells;
}

// ── FEAT PARSER ──────────────────────────────────────────────────────────────
function parseFeats(text) {
  const feats = [];
  const lines = text.split('\n').map(l => l.trim());

  const CATEGORIES = {
    'combat': 'Combat',
    'lineage weapon': 'Lineage Weapon',
    'mutation': 'Mutation',
    'vampiric': 'Vampiric',
    'utility': 'Utility',
    'backgrounds': 'Backgrounds',
    'arcane hindrances': 'Arcane Hindrance',
    'arcane hindrance': 'Arcane Hindrance',
    'mutant hindrances': 'Mutant Hindrance',
    'mutant hindrance': 'Mutant Hindrance',
    'social': 'Social',
    'magic': 'Magic',
  };

  let currentCat = 'Utility';
  let i = 0;

  while (i < lines.length) {
    const line = lines[i];
    if (!line) { i++; continue; }

    // Category header — standalone line matching a known category exactly
    const lineLow = line.toLowerCase();
    let foundCat = false;
    for (const [key, val] of Object.entries(CATEGORIES)) {
      if (lineLow === key) { currentCat = val; foundCat = true; break; }
    }
    if (foundCat) { i++; continue; }

    // Skip separators and numbers
    if (/^-{2,}$/.test(line) || /^\d+$/.test(line)) { i++; continue; }
    // Skip lines that are clearly not names
    if (/^(effect:|requires|no requirement)/i.test(line)) { i++; continue; }
    // Skip long description lines
    if (line.length > 100) { i++; continue; }

    const name = line;

    // Collect description and find Requires line
    const descLines = [];
    let reqLine = '';
    let j = i + 1;
    let foundReq = false;

    while (j < lines.length && j < i + 25) {
      const l = lines[j];
      if (!l) { j++; continue; }
      if (/^requires?\s/i.test(l) || /^no requirement/i.test(l)) {
        reqLine = l; foundReq = true; j++; break;
      }
      // Stop at next category header
      if (Object.keys(CATEGORIES).some(k => l.toLowerCase() === k)) break;
      descLines.push(l);
      j++;
    }

    // Must have at least a description to be a real feat
    if (descLines.length === 0 && !foundReq) { i++; continue; }

    // Clean description — strip "Effect:" prefix
    const desc = descLines
      .map(l => l.replace(/^effect:\s*/i, '').trim())
      .filter(Boolean)
      .join(' ');

    if (!desc) { i++; continue; }

    // Parse requirement
    let req = 'None';
    if (/^no requirement/i.test(reqLine)) req = 'None';
    else if (/^requires?\s/i.test(reqLine)) {
      req = reqLine.replace(/^requires?\s+/i, '').replace(/\.$/, '').trim();
    }

    const limited = /\blimited\b/i.test(desc);

    feats.push({ name, cat: currentCat, req, desc, limited });
    i = j;
  }

  return feats;
}

function parseWeapons(text) {
  const weapons = [];

  // Category detection
  const CAT_PATTERNS = [
    { pat: /^melee/i,       cat: 'Melee (0-2)'      },
    { pat: /^skirmishing/i, cat: 'Skirmishing (2-8)' },
    { pat: /^ranged/i,      cat: 'Ranged (6-30)'     },
  ];

  // Split into blocks by the stats line — that's our reliable anchor
  // Stats line: " One-handed 4 damage 1 action /roll arming"
  // May have parens: " Two-handed 6 damage 2 actions (lift, strike) /roll polearm"
  const STATS_RE = /^\s*(One|Two)-handed\s+(\d+)\s+damage\s+(\d+)\s+action[s]?[^/]*(\/roll\s+\S+)/i;

  const lines = text.split('\n');
  let currentCat = 'Melee (0-2)';

  let i = 0;
  while (i < lines.length) {
    const line = lines[i];
    const trimmed = line.trim();

    // Category header
    for (const { pat, cat } of CAT_PATTERNS) {
      if (pat.test(trimmed) && trimmed.length < 50) {
        currentCat = cat; break;
      }
    }

    // Stats line match
    const statsMatch = line.match(STATS_RE);
    if (!statsMatch) { i++; continue; }

    const hands = statsMatch[1].toLowerCase() === 'one' ? 1 : 2;
    const dmg   = parseInt(statsMatch[2]);
    const acts  = parseInt(statsMatch[3]);
    const cmd   = statsMatch[4].trim().toLowerCase();
    const dpt   = acts > 0 ? parseFloat((dmg / acts).toFixed(1)) : null;

    // Look back up to 15 lines for name, hit bonus, and notes
    let name = '';
    let hit  = null;
    const notes = [];

    for (let k = i - 1; k >= Math.max(0, i - 15); k--) {
      const l = lines[k].trim();
      if (!l) continue;

      // Stop at category header or previous stats line
      if (CAT_PATTERNS.some(p => p.pat.test(l) && l.length < 50)) break;
      if (STATS_RE.test(lines[k])) break;

      // Hit bonus line
      const hitM = l.match(/^\+(\d+)\s+when rolling to hit/i);
      if (hitM) { hit = parseInt(hitM[1]); continue; }

      // Notes lines — damage bonuses, pierce, bypass, cannot penetrate, does not reveal
      if (/^(Pierces|Bypasses|Penetrates|Cannot penetrate|Does not reveal|\+\d+ damage)/i.test(l)) {
        notes.unshift(l);
        continue;
      }

      // Skip "Includes...", description text, and "Sometimes/One small/These/Though/A/An" openers
      if (/^(Includes|Sometimes|One small|These|Though|A |An |Used |Easy |Able |Often |This |The |A versatile|Heavy|Not strong)/i.test(l)) continue;

      // The name is the shortest recent non-note, non-desc line
      if (!name && l.length < 60 && !/^\d+$/.test(l) && !/^-{2,}$/.test(l)) {
        name = l;
      }
    }

    if (!name) { i++; continue; }

    // Requirement — first non-blank line after the stats line
    let req = 'None';
    for (let k = i + 1; k < Math.min(i + 4, lines.length); k++) {
      const l = lines[k].trim();
      if (!l) continue;
      if (/^no requirement/i.test(l)) { req = 'None'; break; }
      if (/^requires?\s/i.test(l)) {
        req = l.replace(/^requires?\s+/i, '').replace(/\.$/, '').trim();
        break;
      }
      break;
    }

    weapons.push({
      cat: currentCat, name, req, hit, hands, dmg, acts, dpt,
      notes: notes.join('. ')
    });
    i++;
  }

  return weapons;
}

function parseArmour(text) {
  // Armour format: Name, desc lines, "Use /roll armour X" line, Requires line
  const armour = [];
  const lines = text.split('\n');
  const ROLL_RE = /\/roll\s+armou?r\s+(\S+)/i;
  let cat = 'Armour';
  let i = 0;

  while (i < lines.length) {
    const trimmed = lines[i].trim();
    if (/^shields?$/i.test(trimmed)) { cat = 'Armour'; i++; continue; }

    const rollMatch = trimmed.match(ROLL_RE);
    if (!rollMatch) { i++; continue; }

    // Name — look back for it
    let name = '';
    for (let k = i - 1; k >= Math.max(0, i - 10); k--) {
      const l = lines[k].trim();
      if (!l) continue;
      if (/^(Includes|Reduces|Use|Requires|Provides|Though|A |An )/i.test(l)) continue;
      if (l.length < 60 && !/^-{2,}$/.test(l)) { name = l; break; }
    }
    if (!name) { i++; continue; }

    // Notes from surrounding lines
    const notes = [];
    for (let k = Math.max(0, i - 10); k < i; k++) {
      const l = lines[k].trim();
      if (l === name || !l) continue;
      if (/^(Includes|Use|Requires)/i.test(l)) continue;
      notes.push(l);
    }

    // Requirement
    let req = 'None';
    for (let k = i + 1; k < Math.min(i + 4, lines.length); k++) {
      const l = lines[k].trim();
      if (!l) continue;
      if (/^no requirement/i.test(l)) { req = 'None'; break; }
      if (/^requires?\s/i.test(l)) {
        req = l.replace(/^requires?\s+/i, '').replace(/\.$/, '').trim(); break;
      }
      break;
    }

    armour.push({ cat, name, req, hit: null, hands: null, dmg: null, acts: null, dpt: null, notes: notes.join(' ') });
    i++;
  }
  return armour;
}


function parseHindrances(text) {
  const hindrances = [];
  const lines = text.split(/\r?\n/).map(l => l.trim()).filter(l => l);
  let currentType = 'Arcane';
  let i = 0;
  while (i < lines.length) {
    if (/arcane/i.test(lines[i]) && lines[i].length < 40) { currentType = 'Arcane'; i++; continue; }
    if (/mutant/i.test(lines[i]) && lines[i].length < 40) { currentType = 'Mutant'; i++; continue; }
    if (/^-{2,}$/.test(lines[i]) || lines[i].length > 80) { i++; continue; }
    const name = lines[i];
    if (!name || /^(requires|effect|method)/i.test(name)) { i++; continue; }
    const descLines = [];
    let j = i + 1;
    while (j < lines.length && j < i + 8 && !/^-{2,}$/.test(lines[j])) {
      if (lines[j].length < 50 && !/[,;]/.test(lines[j]) && descLines.length > 0) break;
      descLines.push(lines[j]); j++;
    }
    hindrances.push({ name, type: currentType, desc: descLines.join(' ').trim() });
    i = j;
  }
  return hindrances;
}

// ── COSTS PARSER ──────────────────────────────────────────────────────────────
function parseCosts(text) {
  const costs = {}, labels = {};
  for (const line of text.split(/\r?\n/).map(l => l.trim()).filter(l => l)) {
    const parts = line.split(',').map(p => p.trim());
    if (parts.length >= 3) {
      const [type, label, xpStr] = parts;
      const xp = parseInt(xpStr);
      if (type && !isNaN(xp)) { costs[type] = xp; labels[type] = label; }
    }
  }
  return { costs, labels };
}

// ── JS GENERATORS ─────────────────────────────────────────────────────────────
function toJS(fmt, data, branch) {
  const j = d => JSON.stringify(d, null, 2);
  switch(fmt) {
    case 'spells': {
      const info = SPELL_BRANCH_FILES[branch];
      if (!info) return '// Error: unknown branch';
      if (CANTRIP_MODES.has(branch)) {
        // Merge with existing cantrips if loading partial — output full CANTRIPS_DEFAULT
        const comment = branch === 'cantrips-inherent'
          ? `Inherent cantrip — ${data[0]?.branch || 'unknown branch'}`
          : branch === 'cantrips-general' ? 'General cantrips'
          : branch === 'cantrips-patron'  ? 'Patron cantrips'
          : 'All cantrips';
        return `// Avalore cantrips — ${comment} — generated by converter
// Place in: data/spells/cantrips.js
// NOTE: This output contains only the entries parsed from this paste.
// Merge with your existing cantrips.js to keep all entries.
window.CANTRIPS_DEFAULT = ${j(data)};
`;
      }
      return `// Avalore spells — ${branch}\n// Place in: data/spells/${info.file}\nwindow.${info.var} = ${j(data)};\n`;
    }
    case 'feats': {
      // Separate regular feats from hindrances
      const regularFeats   = data.filter(f => !f.cat.includes('Hindrance'));
      const arcaneHind     = data.filter(f => f.cat === 'Arcane Hindrance');
      const mutantHind     = data.filter(f => f.cat === 'Mutant Hindrance');
      let out = `// Avalore feats — generated by converter\nwindow.FEATS_DEFAULT = ${j(regularFeats)};\n`;
      if (arcaneHind.length > 0 || mutantHind.length > 0) {
        out += `\n// Avalore hindrances — generated by converter\nwindow.ARCANE_HINDRANCES_DEFAULT = ${j(arcaneHind.map(({name,desc})=>({name,desc})))};\nwindow.MUTANT_HINDRANCES_DEFAULT = ${j(mutantHind.map(({name,desc})=>({name,desc})))};\n`;
      }
      return out;
    }
    case 'weapons':
      return `// Avalore weapons — generated by converter\nwindow.WEAPONS_DEFAULT = ${j(data)};\n`;
    case 'hindrances': {
      const arc = data.filter(h => h.type==='Arcane').map(({name,desc})=>({name,desc}));
      const mut = data.filter(h => h.type==='Mutant').map(({name,desc})=>({name,desc}));
      return `// Avalore hindrances — generated by converter\nwindow.ARCANE_HINDRANCES_DEFAULT = ${j(arc)};\nwindow.MUTANT_HINDRANCES_DEFAULT = ${j(mut)};\n`;
    }
    case 'costs':
      return `// Avalore costs — generated by converter\nwindow.COSTS_DEFAULT = ${j(data.costs)};\nwindow.LABELS_DEFAULT = ${j(data.labels)};\n`;
    default: return '';
  }
}

// ── PREVIEW RENDERERS ──────────────────────────────────────────────────────────
function trunc(s, n=70) { return s && s.length > n ? s.slice(0,n)+'…' : (s||'—'); }

function renderPreview(fmt, data) {
  if (!data) return '<p style="color:var(--danger);font-size:12px">No data parsed.</p>';
  const count = Array.isArray(data) ? data.length : Object.keys(data.costs||{}).length;
  if (count === 0) return '<p style="color:var(--danger);font-size:12px">No items found. Check the format guide and try again.</p>';
  let html = '<div class="preview-wrap"><table class="preview-table">';
  switch(fmt) {
    case 'spells':
      html += '<thead><tr><th>Name</th><th>Anima</th><th>Acts</th><th>Req</th><th>Effect</th><th>Method</th></tr></thead><tbody>';
      for (const s of data)
        html += `<tr>
          <td class="nowrap">${s.name}${s.capstone?' ✦':''}</td>
          <td class="nowrap">${s.anima}</td>
          <td class="nowrap">${s.actions}</td>
          <td class="nowrap">${s.req}</td>
          <td class="wrap">${s.desc||'—'}</td>
          <td class="wrap">${s.method||'—'}</td>
        </tr>`;
      break;
    case 'feats': {
      const regularCount  = data.filter(f => !f.cat.includes('Hindrance')).length;
      const hindranceCount = data.filter(f => f.cat.includes('Hindrance')).length;
      const subtitle = hindranceCount > 0
        ? ` <span style="color:var(--warning);font-size:10px">(incl. ${hindranceCount} hindrances → will go in hindrances.js)</span>` : '';
      html += `<thead><tr><th>Name${subtitle}</th><th>Category</th><th>Limited</th><th>Requirement</th><th>Description</th></tr></thead><tbody>`;
      for (const f of data)
        html += `<tr>
          <td class="nowrap">${f.name}</td>
          <td class="nowrap" style="color:${f.cat.includes('Hindrance')?'var(--warning)':'inherit'}">${f.cat}</td>
          <td class="nowrap">${f.limited?'Yes':'—'}</td>
          <td class="nowrap">${f.req}</td>
          <td class="wrap">${f.desc||'—'}</td>
        </tr>`;
      break;
    }
    case 'weapons':
      html += '<thead><tr><th>Name</th><th>Cat</th><th>Hit</th><th>Hands</th><th>Dmg</th><th>Acts</th><th>Req</th></tr></thead><tbody>';
      for (const w of data)
        html += `<tr><td>${w.name}</td><td>${w.cat}</td><td>${w.hit??'—'}</td><td>${w.hands??'—'}</td><td>${w.dmg??'—'}</td><td>${w.acts??'—'}</td><td>${w.req}</td></tr>`;
      break;
    case 'hindrances':
      html += '<thead><tr><th>Name</th><th>Type</th><th>Description</th></tr></thead><tbody>';
      for (const h of data)
        html += `<tr><td>${h.name}</td><td>${h.type}</td><td title="${h.desc}">${trunc(h.desc)}</td></tr>`;
      break;
    case 'costs':
      html += '<thead><tr><th>Type key</th><th>Label</th><th>XP</th></tr></thead><tbody>';
      for (const [k,v] of Object.entries(data.costs))
        html += `<tr><td>${k}</td><td>${data.labels[k]||''}</td><td>${v}</td></tr>`;
      break;
  }
  return html + '</tbody></table></div>';
}

// ── MAIN CONVERT ──────────────────────────────────────────────────────────────
let lastData = null, lastFmt = '', lastBranch = '';

function convert() {
  const fmt    = document.getElementById('format-sel').value;
  const branch = document.getElementById('branch-sel').value;
  const raw    = document.getElementById('raw-input').value.trim();
  const status = document.getElementById('parse-status');

  if (!fmt)  { status.textContent='Select a data type first.'; status.className='status err'; return; }
  if (fmt === 'spells' && !branch) { status.textContent='Select a branch first.'; status.className='status err'; return; }
  if (!raw)  { status.textContent='Paste some text first.'; status.className='status err'; return; }

  let data;
  try {
    switch(fmt) {
      case 'spells':     data = parseSpells(raw, branch); break;
      case 'feats':      data = parseFeats(raw); break;
      case 'weapons': {
        // Parse both weapons and armour from the same paste
        const wpns = parseWeapons(raw);
        const armr = parseArmour(raw);
        data = [...wpns, ...armr];
        break;
      }
      case 'hindrances': data = parseHindrances(raw); break;
      case 'costs':      data = parseCosts(raw); break;
    }
  } catch(e) {
    status.textContent = 'Parse error: ' + e.message;
    status.className = 'status err';
    console.error(e);
    return;
  }

  const count = Array.isArray(data) ? data.length : Object.keys(data.costs||data).length;
  if (count === 0) {
    status.textContent = 'No items found — check the format guide.';
    status.className = 'status err';
  } else {
    status.textContent = `Parsed ${count} item${count!==1?'s':''}.`;
    status.className = 'status ok';
  }

  document.getElementById('preview-area').innerHTML = renderPreview(fmt, data);
  document.getElementById('preview-count').textContent = count > 0 ? `— ${count} items` : '';

  const js = toJS(fmt, data, branch);
  document.getElementById('js-output').value = js;
  document.getElementById('dl-btn').disabled = count === 0;
  document.getElementById('copy-btn').disabled = count === 0;

  // Update download button and tip
  const info = SPELL_BRANCH_FILES[branch];
  if (fmt === 'spells' && info) {
    document.getElementById('dl-btn').textContent = `↓ Download ${info.file}`;
    const note = CANTRIP_MODES.has(branch)
      ? `Place <code>${info.file}</code> in <code>data/spells/</code>. <b>Merge</b> with your existing file if this is a partial update.`
      : `Place <code>${info.file}</code> in your repo's <code>data/spells/</code> folder.`;
    document.getElementById('dl-tip').innerHTML = note;
  } else {
    document.getElementById('dl-btn').textContent = '↓ Download .js file';
    document.getElementById('dl-tip').innerHTML = fmt === 'feats' ? `Place <code>feats.js</code> in <code>data/</code>. If hindrances were detected, copy the hindrance section into <code>data/hindrances.js</code> separately.` : `Place in your repo's <code>data/</code> folder.`;
  }

  lastData = js; lastFmt = fmt; lastBranch = branch;
}

function downloadJS() {
  if (!lastData) return;
  const info = lastFmt === 'spells' ? SPELL_BRANCH_FILES[lastBranch] : null;
  const filename = info ? info.file : { feats:'feats.js', weapons:'weapons.js', hindrances:'hindrances.js', costs:'costs.js' }[lastFmt] || 'data.js';
  const blob = new Blob([lastData], {type:'text/javascript'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click();
}

function copyJS() {
  navigator.clipboard.writeText(document.getElementById('js-output').value).then(() => {
    const btn = document.getElementById('copy-btn');
    const orig = btn.textContent; btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}
</script>
